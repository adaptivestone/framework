# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Packaging smoke test

on:
  push:
  pull_request:

jobs:
  packaging:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "latest"
          cache: "npm"

      - name: npm clean install
        run: npm ci

      # Packs the published artifact and verifies it from a throwaway consumer —
      # catches dist-only breakage (rewritten import paths, exports map) that the
      # TS-source test suite can't see.
      - name: Packaging smoke test
        run: npm run smoke
